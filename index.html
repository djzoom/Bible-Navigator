<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bible Topology · 圣经章节拓扑</title>

  <!-- Critical resources: warm the connections and preload the data +
       the big D3 bundle in parallel with module parsing. This shaves
       about 300–500 ms off first paint on a cold cache. -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="./data/bible.json" as="fetch" crossorigin>
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/d3@7" as="script" crossorigin>
  <link rel="modulepreload" href="./src/app.js?v=14">
  <link rel="modulepreload" href="./src/shared.js?v=14">
  <link rel="modulepreload" href="./src/sunburst.js?v=14">
  <link rel="modulepreload" href="./src/icicle.js?v=14">
  <link rel="modulepreload" href="./src/morph.js?v=14">
  <link rel="modulepreload" href="./src/i18n.js?v=14">

  <link rel="stylesheet" href="src/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header>
      <div class="title-group">
        <h1 id="title">Bible Topology</h1>
        <div class="subtitle" id="subtitle">A chapter-structure explorer · 66 books · 1,189 chapters · 31,102 verses</div>
      </div>
      <div class="controls">
        <button class="ctrl" id="btn-reset">Reset</button>
        <button class="ctrl" id="btn-lang">中</button>
      </div>
    </header>
    <div class="hint" id="hint">Hover a chapter for verse count · click a book to zoom · click center to reset</div>
    <div class="chart-wrap">
      <div class="chart-stage"></div>
    </div>
  </div>

  <div id="tooltip"></div>

  <aside id="reader" class="reader" aria-hidden="true">
    <header class="reader-head">
      <div class="reader-title">
        <div class="reader-book" id="reader-book"></div>
        <div class="reader-chapter" id="reader-chapter"></div>
      </div>
      <button class="reader-close" id="reader-close" aria-label="Close">×</button>
    </header>
    <div class="reader-body" id="reader-body"></div>
  </aside>

  <nav class="layout-switcher" aria-label="Layout">
    <button class="layout-btn active" data-layout="sunburst" title="Sunburst / 径向">⊙</button>
    <button class="layout-btn" data-layout="icicle-v" title="Icicle Vertical / 矩纵">⬍</button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script type="module" src="./src/app.js?v=14"></script>
</body>
</html>
